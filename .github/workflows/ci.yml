name: CI-CD Spring Angular MySQL
# retrigger: 2026-03-03

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-test:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      IMAGE_TAG: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build backend jar
        working-directory: springboot/app
        run: |
          chmod +x mvnw
          ./mvnw -B clean package -DskipTests

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "Missing secret: DOCKERHUB_USERNAME"
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Missing secret: DOCKERHUB_TOKEN"
            exit 1
          fi

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Use current Docker Hub images in compose
        run: |
          sed -i "s|image: .*angular-app.*|image: ${DOCKERHUB_USERNAME}/angular-app:${IMAGE_TAG}|" docker-compose.yml
          sed -i "s|image: .*springboot-app.*|image: ${DOCKERHUB_USERNAME}/springboot-app:${IMAGE_TAG}|" docker-compose.yml

      - name: Start compose
        run: docker compose up -d

      - name: Verify containers + API
        run: |
          docker compose ps -a

          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -fsS http://localhost:8081/user/all > /dev/null; then
              echo "Backend is up"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend did not become ready in time"
              docker compose ps -a
              docker compose logs spring-boot-app mysql
              exit 1
            fi
            sleep 5
          done

          echo "Waiting for frontend..."
          for i in {1..30}; do
            if curl -fsS http://localhost:4200 > /dev/null; then
              echo "Frontend is up"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Frontend did not become ready in time"
              docker compose ps -a
              docker compose logs angular-app
              exit 1
            fi
            sleep 2
          done

          curl -f http://localhost:8081/user/all
          curl -f http://localhost:4200

      - name: Logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
